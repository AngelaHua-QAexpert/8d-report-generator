# Render 配置文件
# 用于在 Render 平台上部署 NestJS 后端服务

services:
  - type: web
    name: eightd-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: COZE_LLM_API_KEY
        generateValue: true  # 需要在 Render 控制台手动配置

# 环境变量说明：
# COZE_LLM_API_KEY - 你的 LLM API 密钥（必需）
# 在 Render 控制台手动添加此环境变量
