# Railway 配置文件
# 用于部署 NestJS 后端服务

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/api"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
PORT = "3000"

# 环境变量配置
# 需要在 Railway 控制台配置以下环境变量：
# COZE_LLM_API_KEY = "你的 LLM API 密钥"
